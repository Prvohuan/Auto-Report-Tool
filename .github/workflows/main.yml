name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pandas openpyxl sqlalchemy psycopg2-binary

    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --noconsole report_tool.py

    - name: Upload Windows EXE
      uses: actions/upload-artifact@v4
      with:
        name: ReportTool-Windows
        path: dist/report_tool.exe
